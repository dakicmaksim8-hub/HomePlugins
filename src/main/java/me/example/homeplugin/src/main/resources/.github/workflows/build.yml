name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Build jar
      run: |
        mkdir -p out
        javac -d out $(find src/main/java -name "*.java")
        jar cf HomePlugin.jar -C out .

    - name: Upload jar
      uses: actions/upload-artifact@v4
      with:
        name: HomePlugin
        path: HomePlugin.jar
